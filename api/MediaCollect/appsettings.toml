# SerilogUI配置
[SerilogUi]
UserName = "media"
Password = "media"

# 系统配置
[SystemOptions]
Instance = "" # 实例名称
StoragePath = "/app/storage" # 持久化存储路径
ApiLogs = true # 启用API日志
ApiReference = true # 启用API参考
ApiHangfire = true # 启用Hangfire Dashboard
DefaultUser = "media" # 默认用户名
DefaultPassword = "media" # 默认密码

# Token配置
[TokenOptions]
AesKey = "hqFbWJOAztOfRxXRsMDI6oJVVbjIYB92hnFNyZFM/14=" # AES加密密钥
AesIv = "1mSh76L5ueVr0GN7NGIkTA==" # AES偏移
Secret = "Release-MediaCollectApi-Secret-Key"
Issuer = "media"
Audience = "media"
AccessExpiration = 24 # 访问令牌过期时间(小时)

# OIDC配置
[OidcOptions]
RedirectUri = "" # 重定向到后端的地址
ClientId = "" # 客户端ID
ClientSecret = "" # 客户端密钥
AuthorizationEndpoint = "" # 授权端点
TokenEndpoint = "" # 令牌端点
UserInfoEndpoint = "" # 用户信息端点

# 连接配置
[ConnectionOptions]
DbConnection = "HOST=postgres; PORT=5432; DATABASE=api_db; USER ID=root; PASSWORD=root;" # 数据库连接
LogServer = "" # 日志服务, 如: "http://loki:3100"，为空时仅使用本地日志

# SMTP邮箱配置
[SmtpOptions]
Server = "smtp.163.com" # SMTP服务器地址
Port = 587 # 非加密使用25
EnableSsl = true # 是否启用SSL
Username = "" # 邮箱用户名
Password = "" # 邮箱密码/授权码
Title = "Media Collect" # 邮件标题
TemplateRegisterConfirm = "验证码$code，您正在注册成为新用户，感谢您的支持！" # 注册确认模版
TemplateLoginConfirm = "验证码$code，您正在登录，若非本人操作，请勿泄露。" # 登录确认模版

# AI配置
[AiOptions]
BaseUrl = "https://api.deepseek.com" # AI服务地址
ApiKey = "" # AI服务API密钥
Model = "deepseek-chat" # AI模型
TimeoutSeconds = 600 # 超时时间(秒)

# WebDAV配置
[WebDavOptions]
Uri = "" # 服务器地址
Username = "" # 用户名
Password = "" # 密码
MediaDirectory = "" # 媒体存储目录

# Sonarr配置
[SonarrOptions]
BaseUrl = "" # Sonarr地址
ApiKey = "" # Sonarr API密钥

# 字幕配置
[SubtitleOptions]
CronMergeSubtitle = "0 30 16 * * *" # 执行合并字幕任务的时间