<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Cloud & Beam Gradient -->
        <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00F2FE"/>
            <stop offset="100%" stop-color="#4FACFE"/>
        </linearGradient>

        <linearGradient id="beam-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00F2FE" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#4FACFE" stop-opacity="0.0"/>
        </linearGradient>

        <!-- Play Button Gradient (Vibrant Media) -->
        <linearGradient id="play-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FF007A"/>
            <stop offset="100%" stop-color="#7928CA"/>
        </linearGradient>

        <!-- NAS Box Gradient -->
        <linearGradient id="nas-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1E293B" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#0B0F19" stop-opacity="0.95"/>
        </linearGradient>

        <!-- Sparkle Gradient -->
        <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FDE047"/>
            <stop offset="100%" stop-color="#F59E0B"/>
        </linearGradient>

        <!-- Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- Drop Shadow for Play Button -->
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
        </filter>

        <!-- Sparkle Path Definition -->
        <path id="sparkle" d="M 0 -16 C 0 -5, 5 0, 16 0 C 5 0, 0 5, 0 16 C 0 5, -5 0, -16 0 C -5 0, 0 -5, 0 -16 Z"/>
    </defs>

    <!-- =============================== -->
    <!-- 1. DATA BEAM (DOWNLOAD TO NAS)  -->
    <!-- =============================== -->
    <rect x="226" y="140" width="60" height="210" fill="url(#beam-grad)"/>

    <!-- Falling Data Particles in Beam -->
    <circle cx="256" cy="170" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="256" cy="220" r="1.5" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="256" cy="290" r="3" fill="#FFFFFF" opacity="0.9"/>

    <!-- =============================== -->
    <!-- 2. CLOUD & WEBDAV (TOP)         -->
    <!-- =============================== -->
    <g fill="url(#cloud-grad)" filter="url(#glow)">
        <circle cx="216" cy="100" r="28"/>
        <circle cx="256" cy="80" r="42"/>
        <circle cx="301" cy="95" r="32"/>
        <rect x="188" y="90" width="145" height="38" rx="19"/>
    </g>
    <!-- Download Arrow inside Cloud -->
    <path d="M 256 86 L 256 112 M 246 102 L 256 112 L 266 102" stroke="#0F172A" stroke-width="4" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>

    <!-- =============================== -->
    <!-- 3. NAS SERVER BAYS (BOTTOM)     -->
    <!-- =============================== -->
    <g transform="translate(0, 10)" filter="url(#drop-shadow)">
        <!-- NAS Outer Chassis -->
        <rect x="116" y="340" width="280" height="84" rx="20" fill="url(#nas-grad)" stroke="#38BDF8"
              stroke-opacity="0.4" stroke-width="2"/>

        <!-- Drive Slot 1 -->
        <rect x="150" y="360" width="210" height="10" rx="5" fill="#000000" fill-opacity="0.6"/>
        <!-- Drive Slot 2 -->
        <rect x="150" y="388" width="210" height="10" rx="5" fill="#000000" fill-opacity="0.6"/>

        <!-- Activity LEDs -->
        <circle cx="132" cy="365" r="3.5" fill="#00FF87" filter="url(#glow)"/>
        <circle cx="132" cy="393" r="3.5" fill="#00FF87" filter="url(#glow)"/>
        <circle cx="380" cy="365" r="3.5" fill="#38BDF8" filter="url(#glow)"/>
    </g>

    <!-- =============================== -->
    <!-- 4. MEDIA & SUBTITLES (CENTER)   -->
    <!-- =============================== -->
    <g filter="url(#drop-shadow)">
        <!-- Layer 1: Subtitle/Background Merge Layer (Cyan, Glassy) -->
        <!-- Represents the subtitle file merging into the video -->
        <polygon points="206,140 306,195 206,250" fill="#00F2FE" fill-opacity="0.25" stroke="#00F2FE"
                 stroke-opacity="0.9" stroke-width="12" stroke-linejoin="round"/>

        <!-- Layer 2: Main Video Layer (Vibrant Pink) -->
        <polygon points="226,165 336,220 226,275" fill="url(#play-grad)" stroke="url(#play-grad)" stroke-width="14"
                 stroke-linejoin="round"/>
    </g>

    <!-- =============================== -->
    <!-- 5. CLEANUP & MAGIC (ACCENTS)    -->
    <!-- =============================== -->
    <!-- Magic Sweeping Arc (Renaming / Polishing) -->
    <path d="M 150 270 C 190 325, 300 325, 360 250" fill="none" stroke="url(#sparkle-grad)" stroke-width="4"
          stroke-linecap="round" opacity="0.9"/>

    <!-- Sparkles / Stars -->
    <use href="#sparkle" x="360" y="250" transform="scale(1.2)" transform-origin="360 250" fill="url(#sparkle-grad)"
         filter="url(#glow)"/>
    <use href="#sparkle" x="140" y="160" transform="scale(0.9)" transform-origin="140 160" fill="#00F2FE"
         filter="url(#glow)"/>
    <use href="#sparkle" x="340" y="130" transform="scale(0.7)" transform-origin="340 130" fill="url(#sparkle-grad)"
         opacity="0.9"/>

</svg>